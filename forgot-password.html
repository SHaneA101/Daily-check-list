<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Checklist &mdash; Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="login-container">
    <section class="login-panel">
      <div class="login-header">
        <p class="eyebrow">Password recovery</p>
        <h1 data-recovery-title>Reset your password &#128272;</h1>
        <p data-recovery-copy>Enter your work email and we&rsquo;ll send you instructions to create a new password.</p>
      </div>

      <form class="login-form" autocomplete="off" data-auth-form="forgot-password">
        <label>
          <span class="label-text">Work Email</span>
          <div class="input-wrapper">
            <span class="icon">&#128231;</span>
            <input type="email" name="email" placeholder="name@company.com" autocomplete="email" required />
          </div>
        </label>

        <div id="recovery-fields" class="recovery-fields is-hidden">
          <label>
            <span class="label-text">New Password</span>
            <div class="input-wrapper">
              <span class="icon">&#128274;</span>
              <input type="password" name="password" placeholder="Create a new password" autocomplete="new-password" />
            </div>
          </label>

          <label>
            <span class="label-text">Confirm New Password</span>
            <div class="input-wrapper">
              <span class="icon">&#128273;</span>
              <input type="password" name="confirmPassword" placeholder="Re-enter your new password" autocomplete="new-password" />
            </div>
          </label>
        </div>

        <button type="submit" class="primary-btn">
          Send Reset Link <span class="chevron">&rsaquo;</span>
        </button>

        <div class="form-aux form-aux-between">
          <p class="signup-note">
            Remembered your password? <a class="link-primary" href="index.html">Log In</a>
          </p>
          <a class="secondary-btn" href="signup.html">Create Account</a>
        </div>

        <div class="sidebar-message auth-message" id="auth-status">Reset links are sent to your registered work email.</div>
      </form>
    </section>

    <section class="image-panel" aria-hidden="true">
      <div class="image-illustration"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
