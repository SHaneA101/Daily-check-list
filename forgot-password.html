<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Checklist &mdash; Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="login-container">
    <section class="login-panel">
      <div class="login-header">
        <p class="eyebrow">Password recovery</p>
        <h1>Reset your password &#128272;</h1>
        <p>Enter your work email and we&rsquo;ll send you instructions to create a new password.</p>
      </div>

      <form class="login-form" autocomplete="off">
        <label>
          <span class="label-text">Work Email</span>
          <div class="input-wrapper">
            <span class="icon">&#128231;</span>
            <input type="email" placeholder="name@company.com" required />
          </div>
        </label>

        <button type="submit" class="primary-btn">
          Send Reset Link <span class="chevron">&rsaquo;</span>
        </button>

        <div class="form-aux form-aux-between">
          <p class="signup-note">
            Remembered your password? <a class="link-primary" href="index.html">Log In</a>
          </p>
          <a class="secondary-btn" href="signup.html">Create Account</a>
        </div>
      </form>
    </section>

    <section class="image-panel" aria-hidden="true">
      <div class="image-illustration"></div>
    </section>
  </main>
</body>
</html>
